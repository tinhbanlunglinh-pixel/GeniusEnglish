    <title>Genius Tiếng Anh - Cô Lợi</title>
    <script>
      (function() {
        try {
          var currentFetch = window.fetch;
          var patch = function(obj) {
            if (!obj) return;
            try {
              Object.defineProperty(obj, 'fetch', {
                get: function() { return currentFetch; },
                set: function(v) { currentFetch = v; },
                configurable: true,
                enumerable: true
              });
            } catch (inner) {
              console.warn("Prop patch failed on object:", inner);
            }
          };
          patch(window);
          patch(globalThis);
          if (typeof self !== 'undefined') {
            patch(self);
          }
          if (typeof Window !== 'undefined' && Window.prototype) {
            patch(Window.prototype);
          }
        } catch (e) {
          console.warn("Failed to patch fetch setter:", e);
        }
      })();
    </script>
